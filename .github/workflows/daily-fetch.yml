name: Daily CB168 Fetch

on:
  schedule:
    # 每天 01:00 UTC = 09:00 Taiwan
    # GHA schedule 常延遲 5-60 分鐘,對「掛牌歷史」資料無感
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cb168-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install --no-cache-dir openpyxl

      - name: Fetch from cb168
        run: python scripts/fetch.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "::notice::No data changes — skipping commit."
            exit 0
          fi
          git commit -m "Auto-update CB data $(date -u '+%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3; do
            if git pull --rebase -X ours && git push; then
              echo "::notice::Pushed on attempt $i"
              exit 0
            fi
            echo "::warning::push retry $i failed, sleeping…"
            sleep 5
          done
          echo "::error::push failed after 3 retries"
          exit 1
